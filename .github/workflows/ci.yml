name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies (CPU-only PyTorch)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
      - name: Byte-compile all scripts
        run: python -m py_compile *.py
      - name: Smoke test — CASA module (parameter count + forward/backward)
        run: python casa_torch.py
      - name: Smoke test — KNN graph reproduces data/a_geo.npy
        run: python build_a_geo_k.py
